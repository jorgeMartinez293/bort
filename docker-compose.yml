services:
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  scraper:
    build: ./services/scraper
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./data:/data
      - ${MEDIA_HOST_PATH:-./media}:/media
    depends_on: [redis]
    command: python -m services.scraper.main

  tts-worker:
    build: ./services/tts
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./scripts:/app/scripts
      - ./data:/data
      - ${MEDIA_HOST_PATH:-./media}:/media
    depends_on: [redis]
    command: python -m services.tts.main

  video-worker:
    build: ./services/video
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./data:/data
      - ${MEDIA_HOST_PATH:-./media}:/media
    depends_on: [redis]
    command: python -m services.video.main

  upload-worker:
    build: ./services/upload
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./data:/data
      - ${MEDIA_HOST_PATH:-./media}:/media
    depends_on: [redis]
    command: python -m services.upload.main

  scheduler:
    build: ./services/scheduler
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./data:/data
    depends_on: [redis, api]
    command: python -m services.scheduler.main

  api:
    build: ./services/api
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
      - ./data:/data
      - ${MEDIA_HOST_PATH:-./media}:/media
    depends_on: [redis]
    ports:
      - "8000:8000"
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on: [api]
