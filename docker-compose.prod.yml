# docker-compose.prod.yml — overlay for RPi5 production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  video-worker:
    environment:
      VIDEO_ENCODER: libx264

  api:
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --workers 2 --app-dir /app

  ui:
    # In prod, UI is served by nginx (built into the image) — disable the dev server
    profiles: ["dev-only"]

  nginx:
    depends_on:
      - api
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /var/lib/tailscale/certs:/certs:ro
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
